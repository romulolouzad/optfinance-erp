kind = "web"
previewPath = "/"
title = "OptFinance ERP"
version = "1.0.0"
id = "artifacts/optfinance-erp"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 20406

[services.development]
run = "pnpm --filter @workspace/optfinance-erp run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/optfinance-erp", "run", "build" ]
publicDir = "artifacts/optfinance-erp/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "20406"
BASE_PATH = "/"
