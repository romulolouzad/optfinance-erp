<!DOCTYPE html>

<html class="light" lang="pt-br"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Optsolv ERP - Login</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "surface-container-lowest": "#ffffff",
                        "inverse-primary": "#ffb690",
                        "secondary-fixed": "#dce2f7",
                        "on-error-container": "#93000a",
                        "error-container": "#ffdad6",
                        "tertiary-fixed": "#cde5ff",
                        "tertiary-fixed-dim": "#93ccff",
                        "background": "#f9f9ff",
                        "inverse-on-surface": "#edf0ff",
                        "on-tertiary-container": "#003554",
                        "secondary": "#575e70",
                        "secondary-fixed-dim": "#c0c6db",
                        "on-tertiary-fixed": "#001d32",
                        "error": "#ba1a1a",
                        "tertiary": "#006398",
                        "surface-container-highest": "#dce2f7",
                        "on-tertiary": "#ffffff",
                        "surface-variant": "#dce2f7",
                        "primary-fixed-dim": "#ffb690",
                        "on-tertiary-fixed-variant": "#004b74",
                        "on-secondary-fixed": "#141b2b",
                        "on-primary-fixed-variant": "#783200",
                        "outline-variant": "#e0c0b1",
                        "inverse-surface": "#293040",
                        "on-surface": "#141b2b",
                        "surface-container": "#e9edff",
                        "surface-container-low": "#f1f3ff",
                        "surface-container-high": "#e1e8fd",
                        "surface-bright": "#f9f9ff",
                        "on-surface-variant": "#584237",
                        "on-secondary": "#ffffff",
                        "on-background": "#141b2b",
                        "surface-dim": "#d3daef",
                        "primary-container": "#f97316",
                        "outline": "#8c7164",
                        "on-primary-container": "#582200",
                        "surface": "#f9f9ff",
                        "surface-tint": "#9d4300",
                        "primary-fixed": "#ffdbca",
                        "on-secondary-fixed-variant": "#404758",
                        "secondary-container": "#d9dff5",
                        "on-error": "#ffffff",
                        "on-primary": "#ffffff",
                        "on-secondary-container": "#5c6274",
                        "primary": "#9d4300",
                        "on-primary-fixed": "#341100",
                        "tertiary-container": "#00a2f4"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                    "fontFamily": {
                        "headline": ["Inter", "sans-serif"],
                        "body": ["Inter", "sans-serif"],
                        "label": ["Inter", "sans-serif"]
                    }
                },
            },
        }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        body {
            font-family: 'Inter', sans-serif;
        }
    </style>
</head>
<body class="bg-[#F3F4F6] min-h-screen flex flex-col items-center justify-center p-4">
<!-- Login Container -->
<main class="w-full max-w-[440px] flex flex-col items-center gap-8">
<!-- Login Card -->
<section class="w-full bg-surface-container-lowest rounded-xl shadow-lg p-12 flex flex-col">
<!-- Branding Header -->
<div class="flex items-center gap-2 mb-10">
<div class="w-8 h-8 bg-primary-container rounded flex items-center justify-center">
<span class="material-symbols-outlined text-white text-xl" data-icon="architecture" style="font-variation-settings: 'FILL' 1;">architecture</span>
</div>
<div class="flex items-baseline">
<span class="text-on-surface font-bold text-2xl tracking-tight">Optsolv</span>
<span class="text-primary-container font-bold text-2xl ml-1 tracking-tight">ERP</span>
</div>
</div>
<!-- Welcome Text -->
<div class="mb-8">
<h1 class="text-on-surface font-bold text-2xl tracking-tight mb-2">Bem-vindo</h1>
<p class="text-[#6B7280] text-sm font-medium">Acesse com suas credenciais</p>
</div>
<!-- Login Form -->
<form class="space-y-6">
<!-- Email Field -->
<div class="space-y-2">
<label class="block text-[11px] font-bold uppercase tracking-wider text-on-surface-variant" for="email">E-mail</label>
<div class="relative group">
<div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none text-gray-400 group-focus-within:text-primary">
<span class="material-symbols-outlined text-xl" data-icon="mail">mail</span>
</div>
<input class="block w-full pl-10 pr-3 py-3 border-[#D1D5DB] rounded-lg bg-surface-container-low text-on-surface placeholder:text-gray-400 focus:ring-1 focus:ring-primary focus:border-primary transition-all duration-200 outline-none border" id="email" name="email" placeholder="exemplo@optsolv.com" type="email"/>
</div>
</div>
<!-- Password Field -->
<div class="space-y-2">
<label class="block text-[11px] font-bold uppercase tracking-wider text-on-surface-variant" for="password">Senha</label>
<div class="relative group">
<div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none text-gray-400 group-focus-within:text-primary">
<span class="material-symbols-outlined text-xl" data-icon="lock">lock</span>
</div>
<input class="block w-full pl-10 pr-10 py-3 border-[#D1D5DB] rounded-lg bg-surface-container-low text-on-surface placeholder:text-gray-400 focus:ring-1 focus:ring-primary focus:border-primary transition-all duration-200 outline-none border" id="password" name="password" placeholder="••••••••" type="password"/>
<button class="absolute inset-y-0 right-0 pr-3 flex items-center text-primary-container hover:text-primary transition-colors cursor-pointer" type="button">
<span class="material-symbols-outlined text-xl" data-icon="visibility">visibility</span>
</button>
</div>
</div>
<!-- Keep Connected -->
<div class="flex items-center">
<input class="h-4 w-4 text-primary focus:ring-primary border-gray-300 rounded transition-all cursor-pointer" id="remember-me" name="remember-me" type="checkbox"/>
<label class="ml-3 block text-sm text-[#374151] font-medium cursor-pointer" for="remember-me">
                        Manter conectado
                    </label>
</div>
<!-- Login Action -->
<button class="w-full flex justify-center py-3.5 px-4 rounded-lg bg-gradient-to-t from-primary to-primary-container text-white font-bold text-sm tracking-wide shadow-md hover:shadow-lg active:opacity-90 transition-all duration-200 uppercase" type="submit">
                    Entrar
                </button>
<!-- Forgot Password -->
<div class="text-center pt-2">
<a class="text-xs text-[#6B7280] font-medium hover:text-primary-container transition-colors duration-200" href="#">
                        Esqueci minha senha
                    </a>
</div>
</form>
</section>
<!-- Footer Separator -->
<footer class="text-center">
<p class="text-gray-400 text-xs font-medium tracking-tight">
                © 2026 Optsolv. Todos os direitos reservados.
            </p>
</footer>
</main>
<!-- Decorative background element for premium feel -->
<div class="fixed top-0 left-0 w-full h-1 bg-gradient-to-r from-primary to-tertiary-container opacity-50"></div>
</body></html>
